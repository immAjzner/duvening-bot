name: Daily Tefillah Update

on:
  schedule:
    - cron: '0 4 * * *'  # 06:00 ישראל (UTC+2)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python main.py
